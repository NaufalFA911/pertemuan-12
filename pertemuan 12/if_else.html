<!doctype html>
<html>
  <head>
    <title>If Else Kompleks</title>
  </head>
  <body>
    <h2>Penentuan Grade Mahasiswa</h2>

    <script>
      let nilai = 85;

      if (nilai >= 90) {
        document.write("Nilai A");
      } else if (nilai >= 80) {
        document.write("Nilai B");
      } else if (nilai >= 70) {
        document.write("Nilai C");
      } else if (nilai >= 60) {
        document.write("Nilai D");
      } else {
        document.write("Nilai E");
      }
    </script>
  </body>
</html>
