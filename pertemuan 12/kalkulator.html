<!doctype html>
<html>
  <head>
    <title>Kalkulator Sederhana</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }

      input {
        padding: 8px;
        margin: 5px;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <h2>Kalkulator HTML CSS JavaScript</h2>

    <input type="number" id="angka1" placeholder="Angka Pertama" />

    <input type="number" id="angka2" placeholder="Angka Kedua" />

    <br /><br />

    <button onclick="tambah()">+</button>

    <button onclick="kurang()">-</button>

    <button onclick="kali()">*</button>

    <button onclick="bagi()">/</button>

    <h3 id="hasil"></h3>

    <script>
      function tambah() {
        let a = parseFloat(document.getElementById("angka1").value);
        let b = parseFloat(document.getElementById("angka2").value);

        document.getElementById("hasil").innerHTML = "Hasil = " + (a + b);
      }

      function kurang() {
        let a = parseFloat(document.getElementById("angka1").value);
        let b = parseFloat(document.getElementById("angka2").value);

        document.getElementById("hasil").innerHTML = "Hasil = " + (a - b);
      }

      function kali() {
        let a = parseFloat(document.getElementById("angka1").value);
        let b = parseFloat(document.getElementById("angka2").value);

        document.getElementById("hasil").innerHTML = "Hasil = " + a * b;
      }

      function bagi() {
        let a = parseFloat(document.getElementById("angka1").value);
        let b = parseFloat(document.getElementById("angka2").value);

        document.getElementById("hasil").innerHTML = "Hasil = " + a / b;
      }
    </script>
  </body>
</html>
